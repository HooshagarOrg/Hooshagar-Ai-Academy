# Simple test stack: nginx + app + redis (3 containers)
# Start: docker compose -f docker-compose.single.yml up -d --build
# Or: bash scripts/docker-deploy-single.sh

name: hooshagar-simple

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - hooshagar-net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-هوشاگر}
        NEXT_PUBLIC_SUPABASE_PROXY: ${NEXT_PUBLIC_SUPABASE_PROXY:-}
        NEXT_PUBLIC_GEMINI_PROXY: ${NEXT_PUBLIC_GEMINI_PROXY:-}
        NEXT_PUBLIC_OPENROUTER_PROXY: ${NEXT_PUBLIC_OPENROUTER_PROXY:-}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_ARVAN_BUCKET: ${NEXT_PUBLIC_ARVAN_BUCKET:-}
        NEXT_PUBLIC_ARVAN_REGION: ${NEXT_PUBLIC_ARVAN_REGION:-}
        NEXT_PUBLIC_ARVAN_ENDPOINT: ${NEXT_PUBLIC_ARVAN_ENDPOINT:-}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - hooshagar-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hooshagar-net
    restart: unless-stopped

networks:
  hooshagar-net:
    driver: bridge

volumes:
  redis-data:
