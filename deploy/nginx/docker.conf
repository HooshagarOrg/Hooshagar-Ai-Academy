# Nginx inside Docker — load balance across app replicas (Docker DNS round-robin)
# Replace server_name when you have a domain.

upstream hooshagar_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;

    location / {
        proxy_pass http://hooshagar_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}

# HTTPS: mount certs to /etc/nginx/certs and add a listen 443 ssl server block,
# or use certbot on the host with deploy/nginx/hooshagar.conf
