<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#bgGradient)"/>
  
  <!-- Shine Effect -->
  <rect width="512" height="512" rx="102" fill="url(#shineGradient)"/>
  
  <!-- Persian Letter "ه" (Hooshagar) -->
  <text 
    x="50%" 
    y="55%" 
    font-family="Tahoma, Arial, sans-serif" 
    font-size="280px" 
    font-weight="bold" 
    fill="white" 
    text-anchor="middle" 
    dominant-baseline="middle"
  >ه</text>
  
  <!-- AI Dots -->
  <circle cx="380" cy="120" r="20" fill="white" opacity="0.8"/>
  <circle cx="420" cy="160" r="12" fill="white" opacity="0.6"/>
  <circle cx="400" cy="200" r="8" fill="white" opacity="0.4"/>
</svg>

